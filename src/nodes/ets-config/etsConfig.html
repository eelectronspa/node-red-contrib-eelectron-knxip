<script type="text/javascript">
  RED.nodes.registerType('eelectron-knxip-ets-config', {
    category: 'config',
    defaults: {
      name: { value: '' },
      csvData: { value: '' },
      parsedEntries: { value: '' },
      source: { value: 'unknown' },
    },
    credentials: {
      // JSON-stringified KnxprojSecureInterface[]. Stored as a text credential
      // so Node-RED encrypts it at rest in the credentials file rather than
      // the plaintext flows.json. Used by the tunnel-config "Fill from ETS
      // project" button.
      knxprojSecureInfo: { type: 'text' },
    },
    label: function () {
      return this.name || 'ETS project';
    },
    oneditsave: function () {
      // Diagnostic — confirms what Node-RED is about to commit. If
      // parsedEntries is 0 length here, the editor's dirty-state tracker
      // didn't pick up our .val() assignments (most common cause: forgot to
      // fire a change event after the programmatic assignment).
      var pe = $('#node-config-input-parsedEntries').val() || '';
      var cd = $('#node-config-input-csvData').val() || '';
      console.log(
        '[knxip] oneditsave: parsedEntries=', pe.length, 'chars · csvData=',
        cd.length, 'chars',
      );
    },
    oneditprepare: function () {
      var $file = $('#ets-config-file');
      var $clear = $('#ets-config-clear');
      var $status = $('#ets-config-status');
      var $textarea = $('#node-config-input-csvData');
      var $entries = $('#node-config-input-parsedEntries');
      var $source = $('#node-config-input-source');
      var $pwdRow = $('#ets-config-password-row');
      var $pwd = $('#ets-config-password');
      var $reparse = $('#ets-config-reparse');
      // Cache the last file's bytes so the user can re-parse with a password
      // without re-selecting the file in the OS dialog. Cleared on Clear.
      var lastFileBuffer = null;
      var lastFileName = null;

      function refreshStatus() {
        var entries = ($entries.val() || '').trim();
        if (entries) {
          try {
            var arr = JSON.parse(entries);
            $status.text('Loaded from .knxproj — ' + arr.length + ' group address(es)');
            return;
          } catch (e) {
            $status.text('parsedEntries field is not valid JSON');
            return;
          }
        }
        var text = ($textarea.val() || '').trim();
        if (!text) {
          $status.text('No project data loaded');
          return;
        }
        var lines = text.split(/\r?\n/).filter(function (l) { return l.trim() !== ''; }).length;
        $status.text('CSV loaded — ' + lines + ' line(s), ' + text.length + ' chars');
      }

      function setBusy(busy, msg) {
        $file.prop('disabled', busy);
        $clear.prop('disabled', busy);
        if (msg) $status.text(msg);
      }

      function arrayBufferToBase64(buf) {
        var bytes = new Uint8Array(buf);
        var chunk = 0x8000;
        var parts = [];
        for (var i = 0; i < bytes.length; i += chunk) {
          parts.push(String.fromCharCode.apply(null, bytes.subarray(i, i + chunk)));
        }
        return btoa(parts.join(''));
      }

      function applyParseResult(result) {
        // CRITICAL: trigger 'change' after every .val() assignment so
        // Node-RED's dirty-state tracker actually saves the new value when
        // the user clicks Update. Without this, programmatic .val() updates
        // are invisible to the editor and the dialog "saves" with stale data.
        $textarea.val('').trigger('change');
        $entries.val(JSON.stringify(result.groupAddresses || [])).trigger('change');
        $source.val('knxproj').trigger('change');
        // Secure info goes into the credential-bound input; Node-RED writes it
        // to the encrypted credentials file, never to flows.json.
        var secInterfaces = Array.isArray(result.secureInterfaces) ? result.secureInterfaces : [];
        $('#node-config-input-knxprojSecureInfo')
          .val(secInterfaces.length ? JSON.stringify(secInterfaces) : '')
          .trigger('change');
        refreshStatus();
        var pname = result.projectName ? ' "' + result.projectName + '"' : '';
        var withDpt = (result.groupAddresses || []).filter(function (e) { return e.dpt; }).length;
        var msg =
          'Parsed' + pname + ' — ' +
          (result.groupAddresses || []).length + ' GAs (' +
          withDpt + ' with DPT)';
        if (secInterfaces.length) {
          msg += ' · ' + secInterfaces.length + ' secure interface(s)';
        }
        if ((result.warnings || []).length) {
          msg += ' · ' + result.warnings.length + ' warning(s)';
        }
        $status.text(msg + ' — click Update/Add to save.');

        // Project data only reaches the runtime side once Node-RED Deploy
        // pushes the new config into a fresh ETS-config node instance. A
        // visible toast here closes the loop so users don't expect the new
        // GAs to be queryable from listener/writer/ets nodes immediately.
        if (typeof RED !== 'undefined' && typeof RED.notify === 'function') {
          var deployHint = 'KNX/IP: ETS project loaded into the dialog. ' +
            'Click Update/Add, then Deploy to make the new ' +
            (result.groupAddresses || []).length + ' GA(s) live.';
          try {
            RED.notify(deployHint, { type: 'warning', timeout: 6000 });
          } catch (_) {
            // Older Node-REDs only accept the (msg, type) form.
            RED.notify(deployHint, 'warning');
          }
        }
      }

      function handleParseError(xhr, attemptedBase64) {
        setBusy(false);
        var code = xhr.responseJSON && xhr.responseJSON.code;
        var detail = xhr.responseJSON && xhr.responseJSON.error;
        if (code === 'PASSWORD_REQUIRED') {
          $pwdRow.show();
          $reparse.show();
          $status.text('This .knxproj is password-protected. Enter the project password below and click Re-parse.');
          $pwd.trigger('focus');
          return;
        }
        if (code === 'BAD_PASSWORD') {
          $pwdRow.show();
          $reparse.show();
          $status.text('Incorrect password — try again and click Re-parse.');
          $pwd.trigger('focus').trigger('select');
          return;
        }
        if (code === 'AES_NOT_SUPPORTED') {
          $status.text(detail || 'WinZip AES encryption is not supported in this version.');
          return;
        }
        var msg = 'Parse failed (HTTP ' + xhr.status + ')';
        if (detail) msg += ': ' + detail;
        if (attemptedBase64) msg += ' (base64 fallback also failed)';
        $status.text(msg);
      }

      function uploadBinary(arrayBuffer, fallbackToBase64) {
        var password = ($pwd.val() || '');
        var blob = new Blob([arrayBuffer], { type: 'application/octet-stream' });
        console.log(
          '[knxip] uploading .knxproj as octet-stream:',
          arrayBuffer.byteLength,
          'bytes,',
          password ? 'with password' : 'no password',
        );
        return $.ajax({
          url: 'eelectron-knxip-ets-config/parse-knxproj',
          type: 'POST',
          data: blob,
          contentType: 'application/octet-stream',
          processData: false,
          headers: password ? { 'X-Knxproj-Password': password } : {},
        })
          .done(function (result) {
            console.log('[knxip] parse-knxproj OK', result);
            setBusy(false);
            // Clear the password from the field once it's served its purpose;
            // it isn't saved with the node config.
            $pwd.val('');
            applyParseResult(result);
          })
          .fail(function (xhr) {
            console.warn(
              '[knxip] parse-knxproj failed (octet-stream)',
              xhr.status,
              xhr.responseText,
            );
            // Don't fall back to base64 for encryption errors — same answer
            // either path.
            var code = xhr.responseJSON && xhr.responseJSON.code;
            if (
              fallbackToBase64 &&
              code !== 'PASSWORD_REQUIRED' &&
              code !== 'BAD_PASSWORD' &&
              code !== 'AES_NOT_SUPPORTED'
            ) {
              console.log('[knxip] retrying as base64 JSON');
              var b64 = arrayBufferToBase64(arrayBuffer);
              var jsonBody = { fileBase64: b64 };
              if (password) jsonBody.password = password;
              $.ajax({
                url: 'eelectron-knxip-ets-config/parse-knxproj',
                type: 'POST',
                data: JSON.stringify(jsonBody),
                contentType: 'application/json',
              })
                .done(function (result) {
                  console.log('[knxip] parse-knxproj OK (base64)', result);
                  setBusy(false);
                  $pwd.val('');
                  applyParseResult(result);
                })
                .fail(function (xhr2) {
                  console.error(
                    '[knxip] parse-knxproj failed (base64)',
                    xhr2.status,
                    xhr2.responseText,
                  );
                  handleParseError(xhr2, true);
                });
            } else {
              handleParseError(xhr, false);
            }
          });
      }

      $file.on('change', function (evt) {
        var file = (evt.target.files || [])[0];
        if (!file) return;
        var name = (file.name || '').toLowerCase();
        var isKnxproj = name.endsWith('.knxproj');
        console.log('[knxip] file selected:', file.name, file.size, 'bytes, knxproj=', isKnxproj);

        if (isKnxproj) {
          setBusy(true, 'Reading and parsing .knxproj…');
          var fr = new FileReader();
          fr.onload = function (ev) {
            // Cache for re-parse with password attempts.
            lastFileBuffer = ev.target.result;
            lastFileName = file.name;
            uploadBinary(ev.target.result, true);
          };
          fr.onerror = function () {
            setBusy(false);
            $status.text('Could not read file');
          };
          fr.readAsArrayBuffer(file);
          return;
        }

        // CSV path — read as text, fill the textarea, clear any pre-parsed entries.
        lastFileBuffer = null;
        lastFileName = null;
        var reader = new FileReader();
        reader.onload = function (e) {
          $textarea.val(e.target.result).trigger('change');
          $entries.val('').trigger('change');
          $source.val('csv-upload').trigger('change');
          refreshStatus();
        };
        reader.readAsText(file);
      });

      $reparse.on('click', function () {
        if (!lastFileBuffer) {
          $status.text('Re-select the .knxproj file first.');
          return;
        }
        setBusy(true, 'Re-parsing ' + (lastFileName || '.knxproj') + '…');
        uploadBinary(lastFileBuffer, true);
      });

      // Pressing Enter in the password field triggers a re-parse.
      $pwd.on('keydown', function (e) {
        if (e.which === 13) {
          e.preventDefault();
          $reparse.trigger('click');
        }
      });

      $clear.on('click', function () {
        $textarea.val('').trigger('change');
        $entries.val('').trigger('change');
        $source.val('unknown').trigger('change');
        $('#node-config-input-knxprojSecureInfo').val('').trigger('change');
        $file.val('');
        $pwd.val('');
        $pwdRow.hide();
        $reparse.hide();
        lastFileBuffer = null;
        lastFileName = null;
        refreshStatus();
      });

      $textarea.on('input', function () {
        // Manual paste invalidates a previous .knxproj parse.
        if (($entries.val() || '').trim()) $entries.val('').trigger('change');
        if (($textarea.val() || '').trim()) $source.val('csv-paste').trigger('change');
        refreshStatus();
      });

      refreshStatus();
    },
  });
</script>

<script type="text/html" data-template-name="eelectron-knxip-ets-config">
  <div class="form-row">
    <label for="node-config-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-config-input-name" />
  </div>
  <div class="form-row">
    <label><i class="fa fa-upload"></i> Project file</label>
    <input type="file" id="ets-config-file" accept=".csv,.txt,.knxproj" style="width:auto;" />
    <button type="button" class="red-ui-button" id="ets-config-clear" style="margin-left:6px;">Clear</button>
  </div>
  <div class="form-row" id="ets-config-password-row" style="margin-top:-6px; display:none;">
    <label for="ets-config-password"><i class="fa fa-lock"></i> Project password</label>
    <input type="password" id="ets-config-password" autocomplete="off"
           style="width: calc(70% - 90px);" placeholder="ETS project password" />
    <button type="button" class="red-ui-button" id="ets-config-reparse" style="margin-left:6px; display:none;">Re-parse</button>
  </div>
  <div class="form-row" style="margin-top:-6px;">
    <label></label>
    <span id="ets-config-status" style="color:#888;font-style:italic;">No project data loaded</span>
  </div>
  <div class="form-row" style="margin-bottom: 0;">
    <label for="node-config-input-csvData"><i class="fa fa-file-text-o"></i> CSV content</label>
  </div>
  <div class="form-row">
    <textarea id="node-config-input-csvData" rows="10" style="width:100%;font-family:monospace;font-size:11px;"
              placeholder="Paste the ETS group-address CSV export here, or upload a .csv / .knxproj above…"></textarea>
  </div>
  <input type="hidden" id="node-config-input-parsedEntries" />
  <input type="hidden" id="node-config-input-source" />
  <input type="hidden" id="node-config-input-knxprojSecureInfo" />
</script>

<script type="text/html" data-help-name="eelectron-knxip-ets-config">
  <p>Holds a parsed ETS project so other nodes can look up the DPT, name, and
  description for a given group address automatically.</p>

  <h3>How to load a project</h3>
  <p>Two paths, pick whichever fits:</p>
  <ul>
    <li><b>Group-address CSV</b> — in ETS choose <i>Group Addresses → Export</i>.
      Comma, semicolon or tab delimiters; with or without header. Upload the file
      or paste its contents into the textarea.</li>
    <li><b>.knxproj archive</b> — the full ETS6 project file. Uploaded files are
      parsed on the Node-RED server and only the extracted GA list is stored in
      the flow (the raw archive isn't kept in <code>flows.json</code>).
      Password-protected projects are supported when they use ZipCrypto encryption:
      if the parser detects encryption, a password field appears below the
      uploader; type the password and click <b>Re-parse</b>. Passwords are not
      saved with the node config.</li>
  </ul>
  <p>Reference this config from any of:</p>
  <ul>
    <li><code>knxip ets</code> — translator with auto/decode/encode modes</li>
    <li><code>knxip listener</code> — auto-decodes inbound telegrams using the
      per-GA DPT; supports an "All from ETS" subscription mode</li>
    <li><code>knxip writer</code> — encodes outbound payloads using the per-GA
      DPT when none is supplied on the message</li>
  </ul>

  <h3>DPT id normalisation</h3>
  <p>Accepts <code>DPST-1-1</code>, <code>DPT-9.001</code>, <code>1.001</code>, plain
  <code>DPT-7</code> (falls back to <code>7.001</code>), etc. — all normalised
  to <code>main.sub</code> form before codec lookup.</p>

  <p>Multiple ETS configs can coexist — useful for handling several KNX projects
  in one Node-RED instance.</p>
</script>
