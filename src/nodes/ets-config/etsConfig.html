<script type="text/javascript">
  RED.nodes.registerType('eelectron-knxip-ets-config', {
    category: 'config',
    defaults: {
      name: { value: '' },
      csvData: { value: '' },
      parsedEntries: { value: '' },
      source: { value: 'unknown' },
    },
    credentials: {
      // JSON-stringified KnxprojSecureInterface[]. Stored as a text credential
      // so Node-RED encrypts it at rest in the credentials file rather than
      // the plaintext flows.json. Used by the tunnel-config "Fill from ETS
      // project" button.
      knxprojSecureInfo: { type: 'text' },
    },
    label: function () {
      return this.name || 'ETS project';
    },
    oneditsave: function () {
      // Diagnostic — confirms what Node-RED is about to commit. If
      // parsedEntries is 0 length here, the editor's dirty-state tracker
      // didn't pick up our .val() assignments (most common cause: forgot to
      // fire a change event after the programmatic assignment).
      var pe = $('#node-config-input-parsedEntries').val() || '';
      var cd = $('#node-config-input-csvData').val() || '';
      console.log(
        '[knxip] oneditsave: parsedEntries=', pe.length, 'chars · csvData=',
        cd.length, 'chars',
      );
    },
    oneditprepare: function () {
      var $file = $('#ets-config-file');
      var $clear = $('#ets-config-clear');
      var $status = $('#ets-config-status');
      var $textarea = $('#node-config-input-csvData');
      var $entries = $('#node-config-input-parsedEntries');
      var $source = $('#node-config-input-source');
      var $pwdRow = $('#ets-config-password-row');
      var $pwd = $('#ets-config-password');
      var $reparse = $('#ets-config-reparse');
      // Cache the last file's bytes so the user can re-parse with a password
      // without re-selecting the file in the OS dialog. Cleared on Clear.
      var lastFileBuffer = null;
      var lastFileName = null;

      function refreshStatus() {
        var entries = ($entries.val() || '').trim();
        if (entries) {
          try {
            var arr = JSON.parse(entries);
            $status.text('Loaded from .knxproj — ' + arr.length + ' group address(es)');
            return;
          } catch (e) {
            $status.text('parsedEntries field is not valid JSON');
            return;
          }
        }
        var text = ($textarea.val() || '').trim();
        if (!text) {
          $status.text('No project data loaded');
          return;
        }
        var lines = text.split(/\r?\n/).filter(function (l) { return l.trim() !== ''; }).length;
        $status.text('CSV loaded — ' + lines + ' line(s), ' + text.length + ' chars');
      }

      function setBusy(busy, msg) {
        $file.prop('disabled', busy);
        $clear.prop('disabled', busy);
        if (msg) $status.text(msg);
      }

      function arrayBufferToBase64(buf) {
        var bytes = new Uint8Array(buf);
        var chunk = 0x8000;
        var parts = [];
        for (var i = 0; i < bytes.length; i += chunk) {
          parts.push(String.fromCharCode.apply(null, bytes.subarray(i, i + chunk)));
        }
        return btoa(parts.join(''));
      }

      function applyParseResult(result) {
        // CRITICAL: trigger 'change' after every .val() assignment so
        // Node-RED's dirty-state tracker actually saves the new value when
        // the user clicks Update. Without this, programmatic .val() updates
        // are invisible to the editor and the dialog "saves" with stale data.
        $textarea.val('').trigger('change');
        $entries.val(JSON.stringify(result.groupAddresses || [])).trigger('change');
        $source.val('knxproj').trigger('change');
        // Secure info goes into the credential-bound input; Node-RED writes it
        // to the encrypted credentials file, never to flows.json.
        var secInterfaces = Array.isArray(result.secureInterfaces) ? result.secureInterfaces : [];
        $('#node-config-input-knxprojSecureInfo')
          .val(secInterfaces.length ? JSON.stringify(secInterfaces) : '')
          .trigger('change');
        refreshStatus();
        var pname = result.projectName ? ' "' + result.projectName + '"' : '';
        var withDpt = (result.groupAddresses || []).filter(function (e) { return e.dpt; }).length;
        var msg =
          'Parsed' + pname + ' — ' +
          (result.groupAddresses || []).length + ' GAs (' +
          withDpt + ' with DPT)';
        if (secInterfaces.length) {
          msg += ' · ' + secInterfaces.length + ' secure interface(s)';
        }
        if ((result.warnings || []).length) {
          msg += ' · ' + result.warnings.length + ' warning(s)';
        }
        $status.text(msg + ' — click Update/Add to save.');

        // Project data only reaches the runtime side once Node-RED Deploy
        // pushes the new config into a fresh ETS-config node instance. A
        // visible toast here closes the loop so users don't expect the new
        // GAs to be queryable from listener/writer/ets nodes immediately.
        if (typeof RED !== 'undefined' && typeof RED.notify === 'function') {
          var deployHint = 'KNX/IP: ETS project loaded into the dialog. ' +
            'Click Update/Add, then Deploy to make the new ' +
            (result.groupAddresses || []).length + ' GA(s) live.';
          try {
            RED.notify(deployHint, { type: 'warning', timeout: 6000 });
          } catch (_) {
            // Older Node-REDs only accept the (msg, type) form.
            RED.notify(deployHint, 'warning');
          }
        }
      }

      function handleParseError(xhr, attemptedBase64) {
        setBusy(false);
        var code = xhr.responseJSON && xhr.responseJSON.code;
        var detail = xhr.responseJSON && xhr.responseJSON.error;
        if (code === 'PASSWORD_REQUIRED') {
          $pwdRow.show();
          $reparse.show();
          $status.text('This .knxproj is password-protected. Enter the project password below and click Re-parse.');
          $pwd.trigger('focus');
          return;
        }
        if (code === 'BAD_PASSWORD') {
          $pwdRow.show();
          $reparse.show();
          $status.text('Incorrect password — try again and click Re-parse.');
          $pwd.trigger('focus').trigger('select');
          return;
        }
        if (code === 'AES_NOT_SUPPORTED') {
          $status.text(detail || 'WinZip AES encryption is not supported in this version.');
          return;
        }
        var msg = 'Parse failed (HTTP ' + xhr.status + ')';
        if (detail) msg += ': ' + detail;
        if (attemptedBase64) msg += ' (base64 fallback also failed)';
        $status.text(msg);
      }

      function uploadBinary(arrayBuffer, fallbackToBase64) {
        var password = ($pwd.val() || '');
        var blob = new Blob([arrayBuffer], { type: 'application/octet-stream' });
        console.log(
          '[knxip] uploading .knxproj as octet-stream:',
          arrayBuffer.byteLength,
          'bytes,',
          password ? 'with password' : 'no password',
        );
        return $.ajax({
          url: 'eelectron-knxip-ets-config/parse-knxproj',
          type: 'POST',
          data: blob,
          contentType: 'application/octet-stream',
          processData: false,
          headers: password ? { 'X-Knxproj-Password': password } : {},
        })
          .done(function (result) {
            console.log('[knxip] parse-knxproj OK', result);
            setBusy(false);
            // Clear the password from the field once it's served its purpose;
            // it isn't saved with the node config.
            $pwd.val('');
            applyParseResult(result);
          })
          .fail(function (xhr) {
            console.warn(
              '[knxip] parse-knxproj failed (octet-stream)',
              xhr.status,
              xhr.responseText,
            );
            // Don't fall back to base64 for encryption errors — same answer
            // either path.
            var code = xhr.responseJSON && xhr.responseJSON.code;
            if (
              fallbackToBase64 &&
              code !== 'PASSWORD_REQUIRED' &&
              code !== 'BAD_PASSWORD' &&
              code !== 'AES_NOT_SUPPORTED'
            ) {
              console.log('[knxip] retrying as base64 JSON');
              var b64 = arrayBufferToBase64(arrayBuffer);
              var jsonBody = { fileBase64: b64 };
              if (password) jsonBody.password = password;
              $.ajax({
                url: 'eelectron-knxip-ets-config/parse-knxproj',
                type: 'POST',
                data: JSON.stringify(jsonBody),
                contentType: 'application/json',
              })
                .done(function (result) {
                  console.log('[knxip] parse-knxproj OK (base64)', result);
                  setBusy(false);
                  $pwd.val('');
                  applyParseResult(result);
                })
                .fail(function (xhr2) {
                  console.error(
                    '[knxip] parse-knxproj failed (base64)',
                    xhr2.status,
                    xhr2.responseText,
                  );
                  handleParseError(xhr2, true);
                });
            } else {
              handleParseError(xhr, false);
            }
          });
      }

      $file.on('change', function (evt) {
        var file = (evt.target.files || [])[0];
        if (!file) return;
        var name = (file.name || '').toLowerCase();
        var isKnxproj = name.endsWith('.knxproj');
        console.log('[knxip] file selected:', file.name, file.size, 'bytes, knxproj=', isKnxproj);

        if (isKnxproj) {
          setBusy(true, 'Reading and parsing .knxproj…');
          var fr = new FileReader();
          fr.onload = function (ev) {
            // Cache for re-parse with password attempts.
            lastFileBuffer = ev.target.result;
            lastFileName = file.name;
            uploadBinary(ev.target.result, true);
          };
          fr.onerror = function () {
            setBusy(false);
            $status.text('Could not read file');
          };
          fr.readAsArrayBuffer(file);
          return;
        }

        // CSV path — read as text, fill the textarea, clear any pre-parsed entries.
        lastFileBuffer = null;
        lastFileName = null;
        var reader = new FileReader();
        reader.onload = function (e) {
          $textarea.val(e.target.result).trigger('change');
          $entries.val('').trigger('change');
          $source.val('csv-upload').trigger('change');
          refreshStatus();
        };
        reader.readAsText(file);
      });

      $reparse.on('click', function () {
        if (!lastFileBuffer) {
          $status.text('Re-select the .knxproj file first.');
          return;
        }
        setBusy(true, 'Re-parsing ' + (lastFileName || '.knxproj') + '…');
        uploadBinary(lastFileBuffer, true);
      });

      // Pressing Enter in the password field triggers a re-parse.
      $pwd.on('keydown', function (e) {
        if (e.which === 13) {
          e.preventDefault();
          $reparse.trigger('click');
        }
      });

      $clear.on('click', function () {
        $textarea.val('').trigger('change');
        $entries.val('').trigger('change');
        $source.val('unknown').trigger('change');
        $('#node-config-input-knxprojSecureInfo').val('').trigger('change');
        $file.val('');
        $pwd.val('');
        $pwdRow.hide();
        $reparse.hide();
        lastFileBuffer = null;
        lastFileName = null;
        refreshStatus();
      });

      $textarea.on('input', function () {
        // Manual paste invalidates a previous .knxproj parse.
        if (($entries.val() || '').trim()) $entries.val('').trigger('change');
        if (($textarea.val() || '').trim()) $source.val('csv-paste').trigger('change');
        refreshStatus();
      });

      // ---- Generate starter flow -----------------------------------------
      // Drops a fresh tab populated with: an "all-from-ETS" listener wired
      // to a debug node, a shared writer on the right, and one core
      // `inject` node per GA pre-filled with `topic = GA`. Each inject
      // wires to the writer so the user can fire test writes without
      // configuring anything else first.
      var $scaffold = $('#ets-config-scaffold');
      var thisNodeId = (this && this.id) || null;

      function refreshScaffoldEnabled() {
        // Only gate on having a parsed project — that's the precondition we
        // can detect reliably from the dialog. Tunnel availability is
        // checked at click time so the button never looks broken because of
        // a Node-RED API difference.
        var hasEntries = (($entries.val() || '').trim()).length > 0;
        $scaffold.prop('disabled', !hasEntries);
        $scaffold.attr('title', hasEntries ? '' : 'Load a project first');
      }
      // Re-evaluate when entries are loaded/cleared (the parsedEntries hidden
      // input fires `change` after every programmatic update). Also poll
      // once on a short delay because some Node-RED builds restore form
      // values without firing change events.
      $entries.on('change', refreshScaffoldEnabled);
      refreshScaffoldEnabled();
      setTimeout(refreshScaffoldEnabled, 50);
      setTimeout(refreshScaffoldEnabled, 250);

      function makeId() {
        // Node-RED's id helper exists in 3.x+. Fall back to a 16-char hex
        // random for safety on older runtimes.
        if (RED.nodes && typeof RED.nodes.id === 'function') return RED.nodes.id();
        var s = '';
        for (var i = 0; i < 16; i++) s += Math.floor(Math.random() * 16).toString(16);
        return s;
      }

      function pickTunnelConfig(callback) {
        // Find all tunnel-config nodes. `eachConfig` is the canonical Node-RED
        // editor API but older builds expose only `eachNode` (which also
        // includes config nodes). Use both, dedupe by id.
        var seen = {};
        var tunnels = [];
        function maybeAdd(c) {
          if (!c || c.type !== 'eelectron-knxip-config' || seen[c.id]) return;
          seen[c.id] = true;
          tunnels.push(c);
        }
        if (RED.nodes && typeof RED.nodes.eachConfig === 'function') {
          try { RED.nodes.eachConfig(maybeAdd); } catch (e) { /* keep going */ }
        }
        if (RED.nodes && typeof RED.nodes.eachNode === 'function') {
          try { RED.nodes.eachNode(maybeAdd); } catch (e) { /* keep going */ }
        }
        if (tunnels.length === 0) {
          callback(null);
          return;
        }
        if (tunnels.length === 1) {
          callback(tunnels[0]);
          return;
        }
        // Modest inline picker: list options, ask user via prompt(). It's not
        // the prettiest UX, but avoids dragging in a full dialog widget for
        // a one-shot decision.
        var lines = tunnels
          .map(function (t, i) {
            return (i + 1) + ') ' + (t.name || (t.gatewayIp + ':' + (t.gatewayPort || 3671)));
          })
          .join('\n');
        var input = window.prompt(
          'Multiple KNX/IP tunnel configs in this workspace. Pick one:\n\n' +
            lines +
            '\n\nEnter the number:',
          '1',
        );
        if (input === null) {
          callback(null);
          return;
        }
        var idx = parseInt(input, 10) - 1;
        callback(idx >= 0 && idx < tunnels.length ? tunnels[idx] : null);
      }

      function buildStarterFlow(entries, tunnelId, etsConfigId, projectName) {
        var tabId = makeId();
        var tabLabel = 'KNX — ' + (projectName || 'starter');
        var tab = {
          id: tabId,
          type: 'tab',
          label: tabLabel,
          disabled: false,
          info:
            'Generated starter flow for ETS project "' + (projectName || '?') +
            '" (' + entries.length + ' GAs).\n\n' +
            'The shared listener at the top emits *every* decoded telegram from the bound ' +
            'tunnel. One inject node per *writable* GA is wired to the shared writer below — ' +
            'set the inject\'s payload, click its button, and a write goes out to that GA via ' +
            'the tunnel.\n\n' +
            'Group addresses whose name ends with "Status" or "Sts" are skipped on the write ' +
            'side because they are read-only feedback addresses by convention; they remain ' +
            'visible in the listener output. Delete or rewire freely.',
        };

        var nodes = [];

        // Top-of-tab comment.
        nodes.push({
          id: makeId(),
          type: 'comment',
          z: tabId,
          name: 'Auto-generated from ETS project — edit / prune as needed',
          info: '',
          x: 280,
          y: 40,
          wires: [],
        });

        // Shared listener (all-from-ETS) → debug.
        var debugId = makeId();
        nodes.push({
          id: makeId(),
          type: 'eelectron-knxip-listener',
          z: tabId,
          name: 'all bus traffic',
          config: tunnelId,
          etsConfig: etsConfigId,
          subscribeAllFromEts: true,
          groupAddresses: '',
          dpt: '',
          x: 160,
          y: 100,
          wires: [[debugId]],
        });
        nodes.push({
          id: debugId,
          type: 'debug',
          z: tabId,
          name: 'decoded',
          active: true,
          tosidebar: true,
          complete: 'true',
          targetType: 'full',
          x: 380,
          y: 100,
          wires: [],
        });

        // Shared writer on the right.
        var writerId = makeId();
        nodes.push({
          id: writerId,
          type: 'eelectron-knxip-writer',
          z: tabId,
          name: 'shared writer',
          config: tunnelId,
          etsConfig: etsConfigId,
          groupAddress: '',
          dpt: '',
          x: 800,
          y: 100,
          wires: [],
        });

        // One inject per GA — but ONLY for writable GAs. Status / feedback
        // group addresses are read-only by convention; auto-generating a
        // write button for them is a footgun. The all-from-ETS listener
        // already covers them on the read side, so they're still visible
        // in the bus monitor / debug stream — they just don't get an
        // inject wired to the writer.
        //
        // Word-boundary regex: matches "status" or "sts" at the end of the
        // name only when it's a separate word, not a substring (so "Total
        // Costs" or "Tests Setup" won't get mistakenly skipped).
        function isStatusGa(e) {
          var name = (e.name || '').trim();
          return /\b(status|sts)\s*$/i.test(name);
        }
        var writableEntries = entries.filter(function (e) { return !isStatusGa(e); });
        var skipped = entries.length - writableEntries.length;

        // Layout: column starting at y=200, 50px row height, wrap into the
        // next column after ~30 entries to keep the canvas usable.
        var INJECTS_PER_COLUMN = 30;
        var ROW_HEIGHT = 50;
        var COLUMN_WIDTH = 240;
        for (var i = 0; i < writableEntries.length; i++) {
          var e = writableEntries[i];
          var col = Math.floor(i / INJECTS_PER_COLUMN);
          var row = i % INJECTS_PER_COLUMN;
          var x = 160 + col * COLUMN_WIDTH;
          var y = 200 + row * ROW_HEIGHT;
          var label = (e.name || e.ga) + ' (' + e.ga + ')';
          if (label.length > 40) label = label.slice(0, 37) + '…';
          nodes.push({
            id: makeId(),
            type: 'inject',
            z: tabId,
            name: label,
            props: [
              { p: 'payload' },
              { p: 'topic', vt: 'str' },
            ],
            repeat: '',
            crontab: '',
            once: false,
            onceDelay: 0.1,
            topic: e.ga,
            payload: '',
            payloadType: 'str',
            x: x,
            y: y,
            wires: [[writerId]],
          });
        }

        return { tab: tab, nodes: nodes, skipped: skipped };
      }

      $scaffold.on('click', function () {
        var entriesJson = ($entries.val() || '').trim();
        if (!entriesJson) {
          RED.notify('Load a project first', { type: 'warning', timeout: 5000 });
          return;
        }
        var entries;
        try { entries = JSON.parse(entriesJson); } catch (e) {
          RED.notify('parsedEntries is not valid JSON', { type: 'error' });
          return;
        }
        if (!Array.isArray(entries) || entries.length === 0) {
          RED.notify('No group addresses to scaffold', { type: 'warning' });
          return;
        }
        if (entries.length > 500) {
          if (!window.confirm(
            'This will create ' + entries.length + ' inject nodes on a new tab. ' +
            'That is a lot — Node-RED will be sluggish. Continue?',
          )) return;
        }

        pickTunnelConfig(function (tunnel) {
          if (!tunnel) {
            RED.notify('Cancelled — no tunnel selected', { type: 'warning' });
            return;
          }

          // Read project name + this ETS-config id directly from the live form.
          var nameEl = document.getElementById('node-config-input-name');
          var projectName = (nameEl && nameEl.value) ? nameEl.value : null;

          var built = buildStarterFlow(entries, tunnel.id, thisNodeId, projectName);

          // Use RED.nodes.import() — same code path Node-RED uses for paste /
          // import-from-clipboard. It validates each item, attaches `_def`,
          // adds to the model, and registers links in one pass. Building
          // ad-hoc with RED.nodes.add() works in some Node-RED builds but
          // silently drops nodes in others (the symptom: an empty tab).
          var flowArr = [built.tab].concat(built.nodes);
          try {
            var imported = RED.nodes.import(flowArr, { generateIds: false });
            // Some Node-RED builds return { nodes, links, ... }; older ones
            // return an array. Normalise.
            var importedNodes =
              (imported && imported.nodes) ? imported.nodes :
              Array.isArray(imported) ? imported : [];
            RED.workspaces.show(built.tab.id);
            RED.nodes.dirty(true);
            if (RED.view && typeof RED.view.redraw === 'function') {
              RED.view.redraw(true);
            }
            // Push to history so the user can Undo the whole scaffold.
            if (RED.history && typeof RED.history.push === 'function') {
              try {
                RED.history.push({
                  t: 'add',
                  nodes: importedNodes,
                  workspaces: [built.tab],
                  dirty: false,
                });
              } catch (_) { /* older RED — non-fatal */ }
            }
            var skippedNote = built.skipped
              ? ' (skipped ' + built.skipped + ' read-only Status/Sts GA' +
                (built.skipped === 1 ? '' : 's') + ')'
              : '';
            RED.notify(
              'Generated ' + flowArr.length + ' items on tab "' + built.tab.label +
              '" using tunnel "' + (tunnel.name || tunnel.gatewayIp) + '"' +
              skippedNote + '. Click Deploy to push.',
              { type: 'success', timeout: 7000 },
            );
          } catch (err) {
            console.error('[knxip] scaffold import failed', err, flowArr);
            RED.notify(
              'Scaffold import failed: ' + (err && err.message ? err.message : err) +
              ' — check the browser console for details.',
              { type: 'error', timeout: 8000 },
            );
          }
        });
      });

      // ---- KNX → MQTT bridge generator ----
      var $bridge = $('#ets-config-bridge');

      function refreshBridgeEnabled() {
        $bridge.prop('disabled', !((($entries.val() || '').trim()).length > 0));
      }
      $entries.on('change', refreshBridgeEnabled);
      refreshBridgeEnabled();
      setTimeout(refreshBridgeEnabled, 50);
      setTimeout(refreshBridgeEnabled, 250);

      function listAllTunnels() {
        var seen = {};
        var tunnels = [];
        function maybeAdd(c) {
          if (!c || c.type !== 'eelectron-knxip-config' || seen[c.id]) return;
          seen[c.id] = true;
          tunnels.push(c);
        }
        if (RED.nodes && typeof RED.nodes.eachConfig === 'function') {
          try { RED.nodes.eachConfig(maybeAdd); } catch (_) {}
        }
        if (RED.nodes && typeof RED.nodes.eachNode === 'function') {
          try { RED.nodes.eachNode(maybeAdd); } catch (_) {}
        }
        return tunnels;
      }

      function showBridgeModal(tunnels, onConfirm) {
        // Build a one-shot modal with checkboxes for each tunnel + a confirm
        // button. Using jQuery-UI dialog because Node-RED already pulls it in
        // for autocomplete; no extra dep.
        var $dlg = $(
          '<div title="Generate KNX → MQTT bridge">' +
          '<p style="margin:0 0 8px 0;">Pick which KNX/IP tunnels feed this bridge. ' +
          'Each picked tunnel becomes an "all from ETS" listener wired into a single ' +
          'MQTT-publish node (which filters on this ETS project) and finally an ' +
          '<code>mqtt out</code> stub for you to point at your broker.</p>' +
          '<div id="knxip-bridge-tunnel-list" style="max-height:240px;overflow:auto;border:1px solid #ccc;padding:6px 10px;"></div>' +
          '</div>',
        );
        var $list = $dlg.find('#knxip-bridge-tunnel-list');
        tunnels.forEach(function (t, idx) {
          var label =
            (t.name || (t.gatewayIp + ':' + (t.gatewayPort || 3671))) +
            (t.gatewayIp ? '  ' + t.gatewayIp + ':' + (t.gatewayPort || 3671) : '');
          var $row = $('<label style="display:block;padding:2px 0;"></label>');
          $row.append(
            $('<input type="checkbox" />')
              .attr('data-id', t.id)
              .prop('checked', true)
              .css('margin-right', '6px'),
          );
          $row.append(document.createTextNode(label));
          $list.append($row);
          void idx;
        });
        $dlg.dialog({
          modal: true,
          width: 460,
          buttons: {
            Generate: function () {
              var picked = [];
              $list.find('input[type="checkbox"]:checked').each(function () {
                var id = $(this).attr('data-id');
                var t = tunnels.filter(function (x) { return x.id === id; })[0];
                if (t) picked.push(t);
              });
              $(this).dialog('close');
              if (picked.length === 0) {
                RED.notify('No tunnels selected — bridge not generated', { type: 'warning' });
                return;
              }
              onConfirm(picked);
            },
            Cancel: function () { $(this).dialog('close'); },
          },
          close: function () { $dlg.remove(); },
        });
      }

      function buildBridgeFlow(pickedTunnels, etsConfigId, projectName) {
        var tabId = makeId();
        var tabLabel = 'KNX → MQTT — ' + (projectName || 'bridge');
        var tab = {
          id: tabId,
          type: 'tab',
          label: tabLabel,
          disabled: false,
          info:
            'Auto-generated KNX → MQTT publishing bridge for project "' +
            (projectName || '?') + '".\n\n' +
            'Each selected tunnel runs an all-from-ETS listener; their output merges into ' +
            'a single mqtt-publish node that filters on this ETS project and reshapes the ' +
            'message for the broker. Wire the mqtt-out stub on the right to your broker config ' +
            '(double-click it, set Server / topic-stub / QoS) and click Deploy.',
        };
        var nodes = [];

        nodes.push({
          id: makeId(),
          type: 'comment',
          z: tabId,
          name: 'Auto-generated KNX → MQTT bridge — point the mqtt-out at your broker',
          info: '',
          x: 280,
          y: 40,
          wires: [],
        });

        // Centre column: mqtt-publish + mqtt-out.
        var publishId = makeId();
        var mqttOutId = makeId();
        nodes.push({
          id: publishId,
          type: 'eelectron-knxip-mqtt-publish',
          z: tabId,
          name: '',
          etsConfig: etsConfigId,
          topicTemplate: 'knx/{ga}',
          payloadMode: 'object',
          payloadTemplate: '',
          forwardUnknown: false,
          x: 540,
          y: 140,
          wires: [[mqttOutId]],
        });
        nodes.push({
          id: mqttOutId,
          type: 'mqtt out',
          z: tabId,
          name: '',
          topic: '',
          qos: '0',
          retain: '',
          respTopic: '',
          contentType: '',
          userProps: '',
          correl: '',
          expiry: '',
          broker: '',
          x: 760,
          y: 140,
          wires: [],
        });

        // Left column: one listener per picked tunnel.
        var ROW = 70;
        for (var i = 0; i < pickedTunnels.length; i++) {
          var t = pickedTunnels[i];
          nodes.push({
            id: makeId(),
            type: 'eelectron-knxip-listener',
            z: tabId,
            name: t.name || t.gatewayIp,
            config: t.id,
            etsConfig: etsConfigId,
            subscribeAllFromEts: true,
            groupAddresses: '',
            dpt: '',
            readOnConnect: false,
            readDelayMs: 100,
            readMaxCount: 200,
            x: 200,
            y: 140 + i * ROW,
            wires: [[publishId]],
          });
        }
        return { tab: tab, nodes: nodes };
      }

      $bridge.on('click', function () {
        var entriesJson = ($entries.val() || '').trim();
        if (!entriesJson) {
          RED.notify('Load a project first', { type: 'warning' });
          return;
        }
        var tunnels = listAllTunnels();
        if (tunnels.length === 0) {
          RED.notify('Configure at least one KNX/IP tunnel first', { type: 'warning' });
          return;
        }
        showBridgeModal(tunnels, function (picked) {
          var nameEl = document.getElementById('node-config-input-name');
          var projectName = (nameEl && nameEl.value) ? nameEl.value : null;
          var built = buildBridgeFlow(picked, thisNodeId, projectName);
          var flowArr = [built.tab].concat(built.nodes);
          try {
            var imported = RED.nodes.import(flowArr, { generateIds: false });
            var importedNodes =
              (imported && imported.nodes) ? imported.nodes :
              Array.isArray(imported) ? imported : [];
            RED.workspaces.show(built.tab.id);
            RED.nodes.dirty(true);
            if (RED.view && typeof RED.view.redraw === 'function') RED.view.redraw(true);
            if (RED.history && typeof RED.history.push === 'function') {
              try {
                RED.history.push({
                  t: 'add',
                  nodes: importedNodes,
                  workspaces: [built.tab],
                  dirty: false,
                });
              } catch (_) {}
            }
            RED.notify(
              'Bridge generated on tab "' + built.tab.label + '" — ' +
              picked.length + ' listener(s) wired into mqtt-publish. ' +
              'Open the mqtt-out node, point it at your broker, then Deploy.',
              { type: 'success', timeout: 8000 },
            );
          } catch (err) {
            console.error('[knxip] bridge import failed', err, flowArr);
            RED.notify(
              'Bridge import failed: ' + (err && err.message ? err.message : err),
              { type: 'error', timeout: 8000 },
            );
          }
        });
      });

      refreshStatus();
    },
  });
</script>

<script type="text/html" data-help-name="eelectron-knxip-ets-config">
  <p>Holds a parsed ETS project so other nodes can look up the DPT, name, and
  description for a given group address automatically.</p>

  <h3>How to load a project</h3>
  <p>Two paths, pick whichever fits:</p>
  <ul>
    <li><b>Group-address CSV</b> — in ETS choose <i>Group Addresses → Export</i>.
      Comma, semicolon or tab delimiters; with or without header. Upload the file
      or paste its contents into the textarea.</li>
    <li><b>.knxproj archive</b> — the full ETS6 project file. Uploaded files are
      parsed on the Node-RED server and only the extracted GA list is stored in
      the flow (the raw archive isn't kept in <code>flows.json</code>).
      Password-protected projects are supported when they use ZipCrypto encryption:
      if the parser detects encryption, a password field appears below the
      uploader; type the password and click <b>Re-parse</b>. Passwords are not
      saved with the node config.</li>
  </ul>
  <p>Reference this config from any of:</p>
  <ul>
    <li><code>knxip ets</code> — translator with auto/decode/encode modes</li>
    <li><code>knxip listener</code> — auto-decodes inbound telegrams using the
      per-GA DPT; supports an "All from ETS" subscription mode</li>
    <li><code>knxip writer</code> — encodes outbound payloads using the per-GA
      DPT when none is supplied on the message</li>
  </ul>

  <h3>DPT id normalisation</h3>
  <p>Accepts <code>DPST-1-1</code>, <code>DPT-9.001</code>, <code>1.001</code>, plain
  <code>DPT-7</code> (falls back to <code>7.001</code>), etc. — all normalised
  to <code>main.sub</code> form before codec lookup.</p>

  <p>Multiple ETS configs can coexist — useful for handling several KNX projects
  in one Node-RED instance.</p>
</script>
