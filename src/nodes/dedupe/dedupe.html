<script type="text/html" data-help-name="eelectron-knxip-dedupe">
  <p>Drops repeat <code>(topic, payload)</code> messages that arrive within the
  configured time window. Useful for cleaning a noisy listener (some KNX
  devices re-send the same value periodically even when nothing changes) and
  for breaking write → listener feedback loops where a gateway echoes your
  own write back into the flow.</p>

  <h3>How equality is decided</h3>
  <ul>
    <li>Primitives (numbers, booleans, strings) compare by value.</li>
    <li>Buffers compare byte-for-byte.</li>
    <li>Objects (e.g. DPT 10 time, DPT 11 date, DPT 232 RGB) compare by
      canonicalised JSON, so <code>{r:1,g:2}</code> and <code>{g:2,r:1}</code>
      are treated as equal.</li>
  </ul>

  <h3>Window behaviour</h3>
  <p>The window is sliding: if identical messages keep arriving, the window
  keeps rolling. The first non-equal message always passes, regardless of how
  many duplicates were dropped before it.</p>
</script>
