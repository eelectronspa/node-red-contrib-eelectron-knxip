<!--
  KNX/IP bus-monitor sidebar.
  Registers once when the editor loads (the IIFE below runs as soon as
  Node-RED parses this file, regardless of whether a config node is open).
  The sidebar streams every received telegram via SSE and renders a live
  scrolling table.
-->
<script type="text/javascript">
  (function () {
    if (typeof RED === 'undefined' || !RED.sidebar || !RED.sidebar.addTab) return;
    if (RED.sidebar.tabs && RED.sidebar.tabs['eelectron-knxip-monitor']) return;

    // Inject the sidebar-tab icon (KNX small logo) as a CSS class once.
    // We always use the `-light` variant (black glyph). Detecting Node-RED's
    // theme reliably across all theme packages is fragile, and a black glyph
    // reads acceptably on all the common dark themes too. Users who want
    // the white glyph can swap the URL below to `sidebar-logo-small-dark.svg`.
    if (!document.getElementById('knxip-monitor-icon-style')) {
      var $s = document.createElement('style');
      $s.id = 'knxip-monitor-icon-style';
      $s.textContent =
        '.knxip-sidebar-icon{' +
          'display:inline-block;' +
          'width:18px;height:18px;' +
          'vertical-align:middle;' +
          'background-image:url("icons/node-red-contrib-eelectron-knxip/sidebar-logo-small-light.svg");' +
          'background-size:contain;' +
          'background-repeat:no-repeat;' +
          'background-position:center;' +
        '}';
      document.head.appendChild($s);
    }

    var MAX_ROWS = 1000;          // ring on the client too — older rows fall off
    var paused = false;
    var pendingRows = [];
    var allRows = [];
    var filterText = '';
    var es = null;
    var connected = false;

    var $root = $('<div>').css({
      display: 'flex',
      flexDirection: 'column',
      height: '100%',
      fontSize: '12px',
    });

    // ---- Header (toolbar) -------------------------------------------------
    var $toolbar = $('<div>').css({
      display: 'flex',
      alignItems: 'center',
      gap: '6px',
      padding: '6px 8px',
      borderBottom: '1px solid #ccc',
      flex: '0 0 auto',
      flexWrap: 'wrap',
    });
    var $pauseBtn = $('<button type="button" class="red-ui-button">')
      .html('<i class="fa fa-pause"></i>')
      .attr('title', 'Pause');
    var $clearBtn = $('<button type="button" class="red-ui-button">')
      .html('<i class="fa fa-trash-o"></i>')
      .attr('title', 'Clear view');
    var $filterInput = $('<input type="text" placeholder="filter (GA, IA, hex…)">').css({
      flex: '1 1 200px',
      minWidth: '120px',
    });
    $toolbar.append($pauseBtn, $clearBtn, $filterInput);

    // ---- Diagnostics strip -----------------------------------------------
    // Compact per-tunnel counters above the table. Polls
    // `/eelectron-knxip/diagnostics` every 2 s; rendering is O(N tunnels).
    var $diag = $('<div>').css({
      padding: '6px 8px',
      borderBottom: '1px solid #ccc',
      flex: '0 0 auto',
      fontSize: '11px',
      display: 'none',
    });

    function fmtAge(ms) {
      if (ms === null || ms === undefined) return '—';
      if (ms < 1000) return ms + ' ms';
      if (ms < 60_000) return Math.round(ms / 1000) + ' s';
      if (ms < 3_600_000) return Math.round(ms / 60_000) + ' m';
      return Math.round(ms / 3_600_000) + ' h';
    }

    function stateColor(state) {
      if (state === 'connected') return '#388e3c';
      if (state === 'connecting' || state === 'disconnecting') return '#f57c00';
      return '#888';
    }

    function renderDiagnostics(tunnels) {
      if (!Array.isArray(tunnels) || tunnels.length === 0) {
        $diag.hide();
        return;
      }
      $diag.show().empty();
      var now = Date.now();
      tunnels.forEach(function (t) {
        var $row = $('<div>').css({
          display: 'flex',
          gap: '12px',
          alignItems: 'center',
          flexWrap: 'wrap',
          marginBottom: '2px',
        });
        $row.append(
          $('<span>').css({ color: stateColor(t.state), fontWeight: 'bold' }).text('●'),
        );
        $row.append(
          $('<span>').css({ fontWeight: 'bold' }).text(t.label || t.gatewayIp),
        );
        $row.append(
          $('<span>').css({ color: '#888' }).text(
            t.transport.toUpperCase() + (t.secure ? '+SEC' : '') +
            ' ' + t.gatewayIp + ':' + t.gatewayPort +
            (t.assignedAddress ? ' as ' + t.assignedAddress : ''),
          ),
        );
        $row.append(
          $('<span>').text('rx ').append($('<b>').text(t.rxTelegrams || 0)),
        );
        $row.append(
          $('<span>').text('tx ').append($('<b>').text(t.txTelegrams || 0)),
        );
        $row.append(
          $('<span>').text('queue ').append($('<b>').text(t.sendQueueDepth || 0)),
        );
        $row.append(
          $('<span>')
            .attr('title', 'heartbeats OK / failed')
            .text('hb ').append($('<b>').text((t.heartbeatsOk || 0) + '/' + (t.heartbeatsFailed || 0))),
        );
        $row.append(
          $('<span>')
            .attr('title', 'reconnect count')
            .text('reconn ').append($('<b>').text(t.reconnects || 0)),
        );
        $row.append(
          $('<span>')
            .attr('title', 'time since last frame in either direction')
            .text('idle ').append($('<b>').text(fmtAge(t.sinceLastFrameMs))),
        );
        if (t.state === 'connected' && t.uptimeMs) {
          $row.append(
            $('<span>')
              .attr('title', 'time since current connect')
              .text('up ').append($('<b>').text(fmtAge(t.uptimeMs))),
          );
        }
        if (t.lastTunnelLostReason && t.state !== 'connected') {
          $row.append(
            $('<span>').css({ color: '#c62828' }).text('· ' + t.lastTunnelLostReason),
          );
        }
        $diag.append($row);
      });
      void now;
    }

    function pollDiagnostics() {
      $.ajax({
        url: 'eelectron-knxip/diagnostics',
        type: 'GET',
        timeout: 1500,
      })
        .done(function (resp) {
          renderDiagnostics(resp && resp.tunnels);
        })
        .fail(function () {
          // Keep last view; transient editor-restarts shouldn't blank the
          // panel. A persistent failure will eventually show because the
          // tunnels list will go stale.
        });
    }

    // Poll every 2 s while the editor is open. unref-equivalent isn't
    // applicable in browser JS, but the interval is cheap and stops when
    // the editor closes.
    setInterval(pollDiagnostics, 2000);
    pollDiagnostics();

    // ---- Table ------------------------------------------------------------
    var $tableWrap = $('<div>').css({
      flex: '1 1 auto',
      overflow: 'auto',
      fontFamily: 'var(--red-ui-monospace-font, monospace)',
    });
    var $table = $('<table>').css({
      width: '100%',
      borderCollapse: 'collapse',
      fontSize: '11px',
      lineHeight: '1.4',
    });
    var $thead = $('<thead>').html(
      '<tr>' +
        '<th style="text-align:left; padding:4px 6px; border-bottom:1px solid #ccc; position:sticky; top:0; background:var(--red-ui-secondary-background,#fff);">Time</th>' +
        '<th style="text-align:left; padding:4px 6px; border-bottom:1px solid #ccc; position:sticky; top:0; background:var(--red-ui-secondary-background,#fff);">Tunnel</th>' +
        '<th style="text-align:left; padding:4px 6px; border-bottom:1px solid #ccc; position:sticky; top:0; background:var(--red-ui-secondary-background,#fff);">Src</th>' +
        '<th style="text-align:left; padding:4px 6px; border-bottom:1px solid #ccc; position:sticky; top:0; background:var(--red-ui-secondary-background,#fff);">Dst</th>' +
        '<th style="text-align:left; padding:4px 6px; border-bottom:1px solid #ccc; position:sticky; top:0; background:var(--red-ui-secondary-background,#fff);">APCI</th>' +
        '<th style="text-align:left; padding:4px 6px; border-bottom:1px solid #ccc; position:sticky; top:0; background:var(--red-ui-secondary-background,#fff);">Value / hex</th>' +
        '</tr>',
    );
    var $tbody = $('<tbody>');
    $table.append($thead, $tbody);
    $tableWrap.append($table);

    // ---- Footer (status) --------------------------------------------------
    var $footer = $('<div>').css({
      padding: '4px 8px',
      borderTop: '1px solid #ccc',
      flex: '0 0 auto',
      color: '#888',
      fontSize: '11px',
    });

    $root.append($toolbar, $diag, $tableWrap, $footer);

    function fmtTime(ts) {
      var d = new Date(ts);
      var hh = String(d.getHours()).padStart(2, '0');
      var mm = String(d.getMinutes()).padStart(2, '0');
      var ss = String(d.getSeconds()).padStart(2, '0');
      var ms = String(d.getMilliseconds()).padStart(3, '0');
      return hh + ':' + mm + ':' + ss + '.' + ms;
    }

    function apciColor(apci) {
      if (apci === 'GroupValueWrite') return '#1976d2';      // blue
      if (apci === 'GroupValueResponse') return '#388e3c';   // green
      if (apci === 'GroupValueRead') return '#9c27b0';       // purple
      return '#666';
    }

    function rowMatchesFilter(r, q) {
      if (!q) return true;
      q = q.toLowerCase();
      var dec = r.decoded || {};
      return (
        (r.source && r.source.toLowerCase().indexOf(q) !== -1) ||
        (r.destination && r.destination.toLowerCase().indexOf(q) !== -1) ||
        (r.tunnelLabel && r.tunnelLabel.toLowerCase().indexOf(q) !== -1) ||
        (r.apci && r.apci.toLowerCase().indexOf(q) !== -1) ||
        (r.raw && r.raw.toLowerCase().indexOf(q) !== -1) ||
        (dec.gaName && dec.gaName.toLowerCase().indexOf(q) !== -1) ||
        (dec.dpt && dec.dpt.toLowerCase().indexOf(q) !== -1) ||
        (dec.value !== undefined && String(dec.value).toLowerCase().indexOf(q) !== -1)
      );
    }

    function buildRow(r) {
      var $tr = $('<tr>')
        .data('record', r)
        .css({ borderBottom: '1px solid var(--red-ui-secondary-border-color, #eee)' });
      $tr.append(
        $('<td>').css({ padding: '2px 6px', whiteSpace: 'nowrap' }).text(fmtTime(r.ts)),
      );
      $tr.append(
        $('<td>').css({ padding: '2px 6px', whiteSpace: 'nowrap' }).text(r.tunnelLabel || r.tunnelId || ''),
      );
      $tr.append(
        $('<td>').css({ padding: '2px 6px', whiteSpace: 'nowrap' }).text(r.source || ''),
      );
      var $dst = $('<td>').css({ padding: '2px 6px', whiteSpace: 'nowrap' });
      $dst.append($('<span>').css({ fontWeight: 'bold' }).text(r.destination || ''));
      if (r.decoded && r.decoded.gaName) {
        // Literal space in the text node makes copy-paste read "1/1/29 Name"
        // instead of "1/1/29Name"; the visual gap is unchanged.
        $dst.append(
          $('<span>')
            .css({ marginLeft: '6px', color: '#888', fontStyle: 'italic' })
            .text(' ' + r.decoded.gaName),
        );
      }
      $tr.append($dst);
      $tr.append(
        $('<td>')
          .css({ padding: '2px 6px', whiteSpace: 'nowrap', color: apciColor(r.apci) })
          .text(
            r.apci === 'GroupValueWrite' ? 'WRITE' :
            r.apci === 'GroupValueResponse' ? 'RESP' :
            r.apci === 'GroupValueRead' ? 'READ' :
            r.apci || '?',
          ),
      );
      var valueText;
      if (r.decoded) {
        var v = r.decoded.value;
        // Object-valued DPTs (DPT 10 Time, DPT 11 Date, etc.) decode into a
        // structured object; String(obj) prints the useless "[object Object]"
        // — JSON.stringify is the readable form.
        var asText =
          v === null || v === undefined ? ''
          : typeof v === 'object' ? (function () {
              try { return JSON.stringify(v); } catch (_) { return String(v); }
            })()
          : String(v);
        valueText = asText + (r.decoded.unit ? ' ' + r.decoded.unit : '');
      } else {
        valueText = r.raw || '';
      }
      $tr.append(
        $('<td>').css({ padding: '2px 6px', wordBreak: 'break-all' }).text(valueText),
      );
      return $tr;
    }

    function renderAll() {
      $tbody.empty();
      var visible = 0;
      for (var i = 0; i < allRows.length; i++) {
        if (rowMatchesFilter(allRows[i], filterText)) {
          $tbody.append(buildRow(allRows[i]));
          visible++;
        }
      }
      updateFooter(visible);
      // Auto-scroll to bottom unless the user has scrolled up.
      var el = $tableWrap[0];
      if (el && el.scrollTop + el.clientHeight + 50 >= el.scrollHeight) {
        el.scrollTop = el.scrollHeight;
      }
    }

    function appendRow(r) {
      allRows.push(r);
      while (allRows.length > MAX_ROWS) allRows.shift();
      if (!rowMatchesFilter(r, filterText)) {
        updateFooter();
        return;
      }
      $tbody.append(buildRow(r));
      // Trim DOM to MAX_ROWS visible rows.
      var rows = $tbody.children();
      while (rows.length > MAX_ROWS) {
        rows.first().remove();
        rows = $tbody.children();
      }
      var el = $tableWrap[0];
      if (el && el.scrollTop + el.clientHeight + 50 >= el.scrollHeight) {
        el.scrollTop = el.scrollHeight;
      }
      updateFooter();
    }

    function updateFooter(visibleOverride) {
      var visible = visibleOverride;
      if (visible === undefined) visible = $tbody.children().length;
      var status = connected ? '● live' : '○ disconnected';
      var pause = paused ? ' · paused' : '';
      $footer.text(
        status + pause +
        ' · ' + allRows.length + ' record(s) buffered' +
        (filterText ? ' · ' + visible + ' shown' : ''),
      );
    }

    // ---- Event wiring -----------------------------------------------------
    $pauseBtn.on('click', function () {
      paused = !paused;
      $pauseBtn.html(paused ? '<i class="fa fa-play"></i>' : '<i class="fa fa-pause"></i>');
      $pauseBtn.attr('title', paused ? 'Resume' : 'Pause');
      if (!paused && pendingRows.length) {
        for (var i = 0; i < pendingRows.length; i++) appendRow(pendingRows[i]);
        pendingRows = [];
      }
      updateFooter();
    });

    $clearBtn.on('click', function () {
      allRows = [];
      pendingRows = [];
      $tbody.empty();
      updateFooter();
    });

    var filterDebounce = null;
    $filterInput.on('input', function () {
      var v = $filterInput.val() || '';
      clearTimeout(filterDebounce);
      filterDebounce = setTimeout(function () {
        filterText = v.trim();
        renderAll();
      }, 80);
    });

    function connect() {
      if (es) {
        try { es.close(); } catch (_) { }
      }
      try {
        es = new EventSource('eelectron-knxip/monitor/stream');
      } catch (e) {
        connected = false;
        updateFooter();
        return;
      }
      es.onopen = function () {
        connected = true;
        updateFooter();
      };
      es.onmessage = function (ev) {
        try {
          var rec = JSON.parse(ev.data);
          if (paused) {
            pendingRows.push(rec);
            // Don't let the pending list grow unbounded — keep the most recent
            // batch sized to MAX_ROWS so we never lock the UI on resume.
            if (pendingRows.length > MAX_ROWS) pendingRows.shift();
          } else {
            appendRow(rec);
          }
        } catch (e) { /* malformed; ignore */ }
      };
      es.addEventListener('cleared', function () {
        allRows = [];
        pendingRows = [];
        $tbody.empty();
        updateFooter();
      });
      es.onerror = function () {
        connected = false;
        updateFooter();
        // EventSource auto-reconnects with a backoff; nothing else to do.
      };
    }

    RED.sidebar.addTab({
      id: 'eelectron-knxip-monitor',
      name: 'KNX/IP',
      label: 'KNX/IP',
      iconClass: 'knxip-sidebar-icon',
      content: $root,
      enableOnEdit: true,
      onchange: function () {
        if (!es) connect();
      },
    });

    // Open the SSE connection right away so the buffer is warm even before the
    // user clicks the tab. Inexpensive — the server endpoint is gated on
    // editor auth so it's effectively a no-op until login completes.
    connect();
    updateFooter();
  })();
</script>

<script type="text/javascript">
  RED.nodes.registerType('eelectron-knxip-config', {
    category: 'config',
    defaults: {
      name: { value: '' },
      gatewayIp: { value: '', required: true, validate: RED.validators.regex(/^\d{1,3}(\.\d{1,3}){3}$/) },
      gatewayPort: { value: 3671, validate: RED.validators.number() },
      localIp: { value: '' },
      localPort: { value: '' },
      routeBack: { value: undefined },
      requestedIndividualAddress: { value: '' },
      groupAddressStyle: { value: 'long' },
      autoReconnect: { value: true },
      autoReconnectWaitMs: { value: 3000, validate: RED.validators.number() },
      heartbeatIntervalMs: { value: 20000, validate: RED.validators.number() },
      transport: { value: 'udp' },
      secureEnabled: { value: false },
      secureUserId: {
        value: 2,
        validate: function (v) {
          if (!this.secureEnabled) return true;
          var n = Number(v);
          return Number.isInteger(n) && n >= 1 && n <= 127;
        },
      },
    },
    credentials: {
      deviceAuthPassword: { type: 'password' },
      userPassword: { type: 'password' },
    },
    label: function () {
      return this.name || `${this.gatewayIp}:${this.gatewayPort || 3671}`;
    },
    oneditprepare: function () {
      var $btn = $('#ets-discover-btn');
      var $status = $('#ets-discover-status');
      var $select = $('#ets-discover-select');
      var $localIp = $('#node-config-input-localIp');

      function setBusy(busy) {
        $btn.prop('disabled', busy);
        $btn.text(busy ? 'Discovering…' : 'Discover');
      }

      $btn.on('click', function () {
        setBusy(true);
        $status.text('Searching for KNX/IP gateways on the local network…');
        $select.empty().hide();

        var body = { timeoutMs: 3000 };
        var localIp = ($localIp.val() || '').trim();
        if (localIp) body.localAddress = localIp;

        $.ajax({
          url: 'eelectron-knxip/discover-gateways',
          type: 'POST',
          contentType: 'application/json',
          data: JSON.stringify(body),
        })
          .done(function (gateways) {
            setBusy(false);
            if (!Array.isArray(gateways) || gateways.length === 0) {
              $status.text('No gateways responded. Check that the host can reach the multicast group 224.0.23.12 (some VPNs/Docker bridges block it).');
              return;
            }
            $status.text('Found ' + gateways.length + ' gateway(s). Pick one to fill the form:');
            $select.empty().show();
            $select.append($('<option/>').val('').text('— select a gateway —'));
            gateways.forEach(function (g, i) {
              var label = (g.friendlyName || '(unnamed)') + ' — ' + g.address + ':' + g.port;
              if (g.individualAddress) label += '  [' + g.individualAddress + ']';
              $select.append(
                $('<option/>')
                  .val(String(i))
                  .text(label)
                  .data('gateway', g),
              );
            });
          })
          .fail(function (xhr) {
            setBusy(false);
            var msg = 'Discovery failed';
            try {
              var e = xhr.responseJSON && xhr.responseJSON.error;
              if (e) msg += ': ' + e;
            } catch (e) {}
            $status.text(msg);
          });
      });

      $select.on('change', function () {
        var opt = $select.find('option:selected');
        var g = opt.data('gateway');
        if (!g) return;
        $('#node-config-input-gatewayIp').val(g.address);
        $('#node-config-input-gatewayPort').val(g.port);
        if (!$('#node-config-input-name').val() && g.friendlyName) {
          $('#node-config-input-name').val(g.friendlyName);
        }
      });

      // Secure tunneling: reveal credentials when the toggle is on. Secure
      // forces TCP per spec — disable the transport selector while on.
      var $secureChk = $('#node-config-input-secureEnabled');
      var $secureRows = $('.knxip-secure-row');
      var $transport = $('#node-config-input-transport');

      function syncSecure() {
        var on = $secureChk.is(':checked');
        $secureRows.toggle(on);
        if (on) {
          $transport.val('tcp').prop('disabled', true);
        } else {
          $transport.prop('disabled', false);
        }
      }
      $secureChk.on('change', syncSecure);
      syncSecure();

      // "Fill from ETS project" — populate the ETS-config dropdown with the
      // workspace's ETS config nodes, fetch the chosen one's secure info, and
      // auto-fill the secure password fields.
      var $etsPicker = $('#knxip-ets-source');
      var $etsFill = $('#knxip-ets-fill');
      var $etsStatus = $('#knxip-ets-status');
      var $userPicker = $('#knxip-secure-user');
      var $userPickerRow = $('.knxip-secure-user-row');

      function refreshEtsList() {
        $etsPicker.empty().append($('<option/>').val('').text('— pick an ETS config —'));
        RED.nodes.eachConfig(function (cfg) {
          if (cfg.type !== 'eelectron-knxip-ets-config') return;
          var label = cfg.name || ('ETS config ' + cfg.id);
          $etsPicker.append($('<option/>').val(cfg.id).text(label));
        });
      }

      function clearUserPicker() {
        $userPicker.empty();
        $userPickerRow.hide();
        $etsFill.prop('disabled', true);
      }
      clearUserPicker();
      refreshEtsList();

      $etsPicker.on('change', function () {
        var id = $etsPicker.val();
        clearUserPicker();
        if (!id) {
          $etsStatus.text('');
          return;
        }
        $etsStatus.text('Loading project credentials…');
        $.ajax({
          url: 'eelectron-knxip-ets-config/' + encodeURIComponent(id) + '/secure-info',
          type: 'GET',
        })
          .done(function (resp) {
            var ifaces = (resp && resp.secureInterfaces) || [];
            if (!ifaces.length) {
              $etsStatus.text(
                'No secure interfaces found in this project. Re-upload the .knxproj if you just enabled secure mode in ETS.',
              );
              return;
            }
            // Build a flat option list: device IA → user (with description).
            ifaces.forEach(function (iface) {
              var hostLabel = (iface.ipAddress ? iface.ipAddress + ' ' : '') +
                '(' + (iface.individualAddress || '?') + ')';
              if (iface.deviceManagementPassword) {
                $userPicker.append(
                  $('<option/>')
                    .val(JSON.stringify({ ifaceIdx: ifaces.indexOf(iface), userType: 'mgmt' }))
                    .text(hostLabel + ' — Management user (user_id=1)'),
                );
              }
              (iface.tunnelingUsers || []).forEach(function (u) {
                $userPicker.append(
                  $('<option/>')
                    .val(JSON.stringify({ ifaceIdx: ifaces.indexOf(iface), userType: 'tun', userId: u.userId, idx: u.interfaceIndex }))
                    .text(hostLabel + ' — Tunneling user ' + u.interfaceIndex + ' (user_id=' + u.userId + ')'),
                );
              });
            });
            // Cache for the Fill click.
            $etsFill.data('interfaces', ifaces);
            $userPickerRow.show();
            $etsFill.prop('disabled', false);
            $etsStatus.text(
              'Pick the user you want to authenticate as, then click Fill.',
            );
          })
          .fail(function (xhr) {
            var msg = 'Could not load secure info';
            try {
              var err = xhr.responseJSON && xhr.responseJSON.error;
              if (err) msg += ': ' + err;
            } catch (e) {}
            $etsStatus.text(msg + ' (status ' + xhr.status + ')');
          });
      });

      $etsFill.on('click', function () {
        var ifaces = $etsFill.data('interfaces') || [];
        var sel = $userPicker.val();
        if (!sel) return;
        var pick;
        try { pick = JSON.parse(sel); } catch (e) { return; }
        var iface = ifaces[pick.ifaceIdx];
        if (!iface) return;
        var userId, userPassword;
        if (pick.userType === 'mgmt') {
          userId = 1;
          userPassword = iface.deviceManagementPassword || '';
        } else {
          userId = pick.userId;
          var tu = (iface.tunnelingUsers || []).find(function (u) { return u.userId === pick.userId; });
          userPassword = tu ? tu.password : '';
        }
        if (iface.ipAddress) {
          $('#node-config-input-gatewayIp').val(iface.ipAddress).trigger('change');
        }
        $('#node-config-input-secureUserId').val(userId).trigger('change');
        $('#node-config-input-deviceAuthPassword')
          .val(iface.deviceAuthenticationCode || '')
          .trigger('change');
        $('#node-config-input-userPassword').val(userPassword).trigger('change');
        $etsStatus.text(
          'Filled from ' + (iface.ipAddress || iface.individualAddress) +
          ' as user_id=' + userId +
          '. Click Update/Add to save.',
        );
      });
    },
  });
</script>

<script type="text/html" data-help-name="eelectron-knxip-config">
  <p>Connection settings for a single KNX/IP gateway.</p>
  <p>Multiple instances of this node can coexist — each holds its own tunnel.</p>
  <p>Leave <b>Local IP</b> blank to use route-back (recommended for Docker/NAT setups).</p>
  <h3>Discover</h3>
  <p>Click <b>Discover</b> to send a multicast SEARCH_REQUEST and list gateways that
  respond. Selecting one fills the Gateway IP, Port, and (if blank) Name fields.
  If you have multiple network interfaces, set the Local IP first to choose which
  one the discovery probes go out on.</p>
  <h3>Transport</h3>
  <p><b>UDP</b> is the classic tunneling transport. <b>TCP</b> is required for
  KNX/IP Secure and supported by some modern interfaces for plain tunneling too.</p>
  <h3>KNX/IP Secure</h3>
  <p>Enable <b>Secure</b> to authenticate and encrypt the tunnel per the KNX/IP
  Secure spec. This forces TCP.</p>

  <h4>Two configuration modes</h4>
  <p><b>1. ETS-managed device</b> — upload a <code>.knxkeys</code> file in the
  ETS Project config node, then use <b>Fill from</b> in this dialog to pick an
  interface. All three fields populate automatically.</p>
  <p><b>2. Single-password / non-ETS device</b> — many vendor interfaces only
  expose one password in their web UI. Put that one password in <b>User pw</b>
  and leave <b>Device auth pw</b> blank. With it blank we skip the
  SESSION_RESPONSE MAC check (server identity is not cryptographically
  verified, but the session is still encrypted and the user-password check
  still authenticates the client to the server).</p>

  <h4>Fields</h4>
  <ul>
    <li><b>User ID</b> — the tunnelling user index (default 2). User 1 is
    management; runtime traffic typically uses 2..127. If unsure on a
    single-password device, try 2 first, then 1.</li>
    <li><b>User pw</b> <i>(required)</i> — the per-user / tunnel password.
    From ETS this is the user password; on a single-password device this is
    the one password the web UI exposes.</li>
    <li><b>Device auth pw</b> <i>(optional)</i> — per-device code set in ETS.
    Leave blank for non-ETS devices that don't expose it.</li>
  </ul>

  <p>Passwords are stored encrypted in Node-RED's credentials file, not in the
  flow JSON. Clearing a password field and saving will wipe the stored value.</p>
</script>
